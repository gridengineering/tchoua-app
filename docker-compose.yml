services:
  # ─── Application Tchoua App ───────────────────────────────────────────────
  app:
    image: tchoua/tchoua-app:latest
    container_name: tchoua-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tchoua_user:${DB_PASSWORD}@db:5432/tchoua_db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tchoua-network

  # ─── Base de données PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tchoua-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tchoua_db
      POSTGRES_USER: tchoua_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tchoua-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tchoua_user -d tchoua_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tchoua-network

  # ─── Nginx Reverse Proxy (optionnel, décommentez si pas de reverse proxy externe) ──
  # nginx:
  #   image: nginx:alpine
  #   container_name: tchoua-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - tchoua-network

volumes:
  tchoua-db-data:

networks:
  tchoua-network:
    driver: bridge